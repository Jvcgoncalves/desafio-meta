services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casecellshop
      POSTGRES_USER: casecellshop
      POSTGRES_PASSWORD: casecellshop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casecellshop -d casecellshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://casecellshop:casecellshop@postgres:5432/casecellshop?schema=public
      JWT_SECRET: local-development-secret
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
